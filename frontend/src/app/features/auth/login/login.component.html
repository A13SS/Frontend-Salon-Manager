<div class="login-container">
  <div class="lado-izquierdo">
    <img src="../../../../assets/images/profesional.jpeg" alt="Profesionales Salon Manager" />
  </div>

  <div class="lado-derecho">
    <div class="formulario-container">
      <div class="logo-container">
        <img src="../../../../assets/images/logo.png" alt="Salon Manager Logo" />
      </div>

      <div class="titulo">
        <p>Inicia sesión en tu cuenta</p>
      </div>

      <form (ngSubmit)="onSubmit()">
        <div class="campo">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            [(ngModel)]="credentials.email"
            name="email"
            required
            placeholder="tu@email.com"
          />
        </div>

        <div class="campo">
          <label for="password">Contraseña</label>
          <input
            type="password"
            id="password"
            [(ngModel)]="credentials.password"
            name="password"
            required
            placeholder="••••••••"
          />
        </div>

        <div *ngIf="errorMessage" class="error">
          {{ errorMessage }}
        </div>

        <div class="botones">
          <button type="submit" class="boton" [disabled]="loading">
            <span *ngIf="loading" class="loading"></span>
            Iniciar Sesión
          </button>
        </div>
      </form>

      <div class="registro">
        <p>
          ¿No tienes cuenta?
          <a routerLink="/registro" class="enlace">Regístrate aquí</a>
        </p>
      </div>
    </div>
  </div>
</div>
