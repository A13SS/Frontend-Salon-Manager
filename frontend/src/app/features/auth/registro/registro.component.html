<div class="registro-container">
  <div class="lado-izquierdo">
    <div class="formulario-container">
      <div class="logo-container">
        <img src="../../../../assets/images/logo.png" alt="Salon Manager Logo" />
      </div>

      <div class="titulo">
        <h2>Registro de Usuario</h2>
        <p>Crea tu cuenta en Salon Manager</p>
      </div>

      <form (ngSubmit)="onSubmit()">
        <div class="campo">
          <label for="nombre">Nombre completo</label>
          <input
            type="text"
            id="nombre"
            [(ngModel)]="registroData.nombre"
            name="nombre"
            required
            placeholder="Alejandro Fernández"
          />
        </div>

        <div class="campo">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            [(ngModel)]="registroData.email"
            name="email"
            required
            placeholder="tu@email.com"
          />
        </div>

        <div class="campo">
          <label for="telefono">Teléfono</label>
          <input
            type="tel"
            id="telefono"
            [(ngModel)]="registroData.telefono"
            name="telefono"
            required
            placeholder="649807654"
          />
        </div>

        <div class="campo">
          <label for="password">Contraseña</label>
          <input
            type="password"
            id="password"
            [(ngModel)]="registroData.password"
            name="password"
            required
            minlength="6"
            placeholder="Mínimo 6 caracteres"
          />
        </div>

        <div *ngIf="errorMessage" class="error">
          {{ errorMessage }}
        </div>

        <div *ngIf="successMessage" class="exito">
          {{ successMessage }}
        </div>

        <div class="botones">
          <button type="submit" class="boton" [disabled]="loading">
            <span *ngIf="loading" class="loading"></span>
            Registrarse
          </button>
        </div>
      </form>

      <div class="login-link">
        <p>
          ¿Ya tienes cuenta?
          <a routerLink="/login" class="enlace">Inicia sesión aquí</a>
        </p>
      </div>
    </div>
  </div>

  <div class="lado-derecho">
    <img src="../../../../assets/images/modelos.jpg" alt="Modelos Salon Manager" />
  </div>
</div>
