<div>
  <div>
    <div>
      <h3>Reservar Nueva Cita</h3>
    </div>

    <div>
      <form (ngSubmit)="onSubmit()">
        <!-- Profesional -->
        <div>
          <label for="profesionalId">Profesional</label>
          <select id="profesionalId" [(ngModel)]="citaData.profesionalId"
            name="profesionalId" (change)="onProfesionalChange()" required>
            <option value>Seleccione un profesional</option>
            <option *ngFor="let prof of profesionales" [value]="prof.id">
              {{ prof.nombre }}
            </option>
          </select>
        </div>

        <div *ngIf="user?.rol !== 'CLIENTE'">
          <label for="clienteId">Cliente</label>
          <select id="clienteId" [(ngModel)]="citaData.clienteId"
            name="clienteId" required>
            <option value>Seleccione un cliente</option>
            <option *ngFor="let cliente of clientes" [value]="cliente.id">
              {{ cliente.nombre }}
            </option>
          </select>
        </div>

        <!-- Servicio -->
        <div>
          <label for="servicioId">Servicio</label>
          <select id="servicioId" [(ngModel)]="citaData.servicioId"
            name="servicioId" (change)="onServicioChange()" required>
            <option value>Seleccione un servicio</option>
            <option *ngFor="let serv of servicios" [value]="serv.id">
              {{ serv.nombre }} - {{ serv.precio | number: '1.2-2' }}€ ({{
              serv.duracionMin }} min)
            </option>
          </select>
        </div>

        <!-- Fecha -->
        <div>
          <label for="fechaSeleccionada">Fecha</label>
          <input type="date" id="fechaSeleccionada"
            [(ngModel)]="fechaSeleccionada" name="fechaSeleccionada"
            [min]="fechaMinima" (change)="onFechaChange()" required />
        </div>

        <!-- Huecos Disponibles -->
        <div
          *ngIf="fechaSeleccionada && citaData.profesionalId && citaData.servicioId">
          <h4>Huecos Disponibles</h4>

          <!-- Loading -->
          <div *ngIf="loadingHuecos">Cargando huecos...</div>

          <!-- Grid de Huecos -->
          <div *ngIf="!loadingHuecos && huecosDisponibles.length > 0">
            <!-- Mañana -->
            <div>
              <h5>Mañana (9:00 - 14:00)</h5>
              <div>
                <button *ngFor="let hueco of huecosDisponibles | slice: 0 : 21"
                  type="button" [disabled]="!hueco.disponible"
                  (click)="seleccionarHora(hueco.hora)"
                  [class.hueco-libre]="hueco.disponible && !estaHoraSeleccionada(hueco.hora)"
                  [class.hueco-ocupado]="!hueco.disponible"
                  [class.hueco-seleccionado]="estaHoraSeleccionada(hueco.hora)">
                  {{ hueco.hora }}
                </button>
              </div>
            </div>

            <!-- Tarde -->
            <div>
              <h5>Tarde (17:00 - 20:00)</h5>
              <div>
                <button *ngFor="let hueco of huecosDisponibles | slice: 21 : 34"
                  type="button" [disabled]="!hueco.disponible"
                  (click)="seleccionarHora(hueco.hora)"
                  [class.hueco-libre]="hueco.disponible && !estaHoraSeleccionada(hueco.hora)"
                  [class.hueco-ocupado]="!hueco.disponible"
                  [class.hueco-seleccionado]="estaHoraSeleccionada(hueco.hora)">
                  {{ hueco.hora }}
                </button>
              </div>
            </div>

            <div *ngIf="citaData.fechaInicio">
              <strong>Hora seleccionada:</strong> {{ citaData.fechaInicio |
              date: 'dd/MM/yyyy HH:mm' }}
            </div>
          </div>
        </div>

        <!-- Alergias -->
        <div>
          <label for="alergias">Alergias (opcional)</label>
          <textarea id="alergias" [(ngModel)]="citaData.alergias"
            name="alergias" rows="2"
            placeholder="Alergia al gel de peinado..."></textarea>
        </div>

        <!-- Observaciones -->
        <div>
          <label for="observaciones">Observaciones (opcional)</label>
          <textarea id="observaciones" [(ngModel)]="citaData.observaciones"
            name="observaciones" rows="3"
            placeholder="Primera visita, preferiblemente por la mañana..."></textarea>
        </div>

        <!-- Mensaje de error -->
        <div *ngIf="errorMessage">
          {{ errorMessage }}
        </div>

        <!-- Botones -->
        <div>
          <button type="submit" [disabled]="loading || !citaData.fechaInicio">
            {{ loading ? 'Creando cita...' : 'Reservar Cita' }}
          </button>
          <a routerLink="/citas">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</div>
